<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gualberto & Jhenny — Wedding</title>

    <!-- Fuentes minimalistas: Cormorant (Elegante) y Montserrat (Moderna/Limpia) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- NAVEGACIÓN INVISIBLE (Solo aparece el botón RSVP) -->
    <nav class="top-nav">
      <a href="#rsvp" class="btn-minimal">Confirmar Asistencia</a>
    </nav>

    <!-- HERO EDITORIAL -->
    <header class="hero">
      <div class="hero-content fade-in">
        <p class="hero-subtitle" id="hero-date-top"></p>
        <h1 class="hero-title">
          <span id="hero-groom"></span>
          <span class="ampersand">&amp;</span>
          <span id="hero-bride"></span>
        </h1>
        <p class="hero-location" id="hero-location"></p>
      </div>
    </header>

    <!-- CUENTA REGRESIVA -->
    <section class="section countdown-section bg-dark">
      <div class="container reveal">
        <div class="countdown-wrapper" id="countdown">
          <div class="cd-item">
            <span id="cd-days">00</span>
            <p>Días</p>
          </div>
          <div class="cd-item">
            <span id="cd-hours">00</span>
            <p>Hrs</p>
          </div>
          <div class="cd-item">
            <span id="cd-minutes">00</span>
            <p>Min</p>
          </div>
        </div>
      </div>
    </section>

    <!-- INTRODUCCIÓN Y PADRES -->
    <section class="section">
      <div class="container container-narrow reveal text-center">
        <h2 class="script-title">Con la bendición de Dios</h2>
        <p class="body-text" id="blessing-text" style="margin-bottom: 4rem"></p>

        <p class="overline">Nuestros Padres</p>
        <div class="parents-grid" id="parents-grid"></div>
      </div>
    </section>

    <!-- ITINERARIO (2 DÍAS) -->
    <section class="section bg-light" id="itinerario">
      <div class="container reveal">
        <div class="section-header text-center">
          <p class="overline">Itinerario</p>
          <h2 class="display-title">La Celebración</h2>
        </div>

        <div class="timeline-grid" id="timeline-grid">
          <!-- Renderizado por JS -->
        </div>
      </div>
    </section>

    <!-- PADRINOS -->
    <section class="section">
      <div class="container container-narrow reveal text-center">
        <p class="overline">Nos acompañan</p>
        <h2 class="display-title" style="margin-bottom: 3rem">
          Nuestros Padrinos
        </h2>
        <div id="godparents-grid" class="godparents-minimal"></div>
      </div>
    </section>

    <!-- RSVP (FORMULARIO ALTA COSTURA) -->
    <section class="section bg-dark" id="rsvp">
      <div class="container container-narrow reveal text-center">
        <h2 class="display-title text-white">Confirmar Asistencia</h2>
        <p
          class="body-text text-white"
          style="opacity: 0.7; margin-bottom: 3rem"
        >
          Por favor confírmanos tu asistencia antes del
          <span id="rsvp-date"></span>.
        </p>

        <form class="minimal-form" id="rsvp-form">
          <div class="form-group">
            <input
              type="text"
              name="name"
              placeholder="Tu nombre completo"
              required
            />
          </div>

          <div class="form-radio-group">
            <label class="radio-label">
              <input type="radio" name="attending" value="yes" required />
              <span>Con gusto asistiré</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="attending" value="no" />
              <span>Lamentablemente no podré</span>
            </label>
          </div>

          <div id="conditional-fields" style="display: none; margin-top: 2rem">
            <div class="form-group">
              <input
                type="number"
                name="guests"
                placeholder="Número total de personas (incluyéndote)"
                min="1"
              />
            </div>
            <div class="form-group">
              <textarea
                name="message"
                rows="2"
                placeholder="Un mensaje para nosotros (opcional)"
              ></textarea>
            </div>
          </div>

          <button type="submit" class="btn-solid">Enviar Confirmación</button>
        </form>
      </div>
    </section>

    <footer class="footer text-center">
      <p class="overline" id="footer-names"></p>
      <p class="footer-note">G & J — 2026</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
